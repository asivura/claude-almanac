name: Link Check

on:
  schedule:
    - cron: '0 8 * * 1'  # Mondays at 8am UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: lycheeverse/lychee-action@v2
        with:
          args: '--verbose --no-progress --accept 200,429 ./**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
